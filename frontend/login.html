<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SEPLAT OpsView — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1c3d;
      --navy-mid: #122554;
      --navy-deep: #081530;
      --green: #00a859;
      --green-light: #00c96b;
      --orange: #f5821f;
      --red: #e03030;
      --white: #ffffff;
      --gray: #c8d4e8;
      --text-muted: #8ca3c8;
      --card-border: #1e3a6e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--navy-deep);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,168,89,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,168,89,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.12;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--green); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #0055ff; bottom: -80px; right: -80px; }

    /* Header bar */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--green), var(--green-light), transparent);
    }

    /* Login card */
    .login-card {
      background: rgba(18, 37, 84, 0.85);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,168,89,0.1);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      z-index: 1;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: var(--green);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0,168,89,0.4);
    }

    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .logo-text span { color: var(--green); }

    .tagline {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 36px;
      padding-left: 56px;
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    input {
      padding: 12px 16px;
      background: rgba(11,28,61,0.8);
      border: 1.5px solid var(--card-border);
      border-radius: 8px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,168,89,0.15);
    }

    input.error { border-color: var(--red); }

    input::placeholder { color: rgba(140,163,200,0.5); }

    .error-msg {
      font-size: 0.72rem;
      color: var(--red);
      display: none;
    }
    .error-msg.visible { display: block; }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--green-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,168,89,0.35);
    }

    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Register link */
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .register-link a {
      color: var(--green-light);
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover { text-decoration: underline; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
    }
    #toast.success { background: var(--green); color: #fff; }
    #toast.error   { background: var(--red); color: #fff; }
    #toast.show    { opacity: 1; transform: translateY(0); pointer-events: auto; }

    /* Security badge */
    .security-note {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--card-border);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .security-note span { color: var(--green); font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="top-bar"></div>

<div class="login-card">

  <div class="logo-area">
    <div class="logo-icon">⛽</div>
    <div class="logo-text">SEPLAT <span>OpsView</span></div>
  </div>
  <div class="tagline">Field Operations Intelligence Platform</div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input id="email" type="email" placeholder="operator@seplat.com" />
    <span class="error-msg" id="err-email">Enter a valid email address.</span>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" />
    <span class="error-msg" id="err-password">Password is required.</span>
  </div>

  <button class="btn-login" id="loginBtn">
    <div class="spinner" id="spinner"></div>
    Access Dashboard
  </button>

  <div class="register-link">
    No account? <a href="register.html">Register here</a>
  </div>

  <div class="security-note">
    <span>🔒</span>
    Secured connection · Authorized personnel only · NCDMB/SEPLAT HCD Programme
  </div>

</div>

<div id="toast"></div>

<script>
  // ── CONFIG ────────────────────────────────────────────
  const API_BASE = 'https://fsd-a8lo.onrender.com/api';

  // ── Toast ─────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
    t.className = `${type} show`;
    setTimeout(() => { t.className = ''; }, 3200);
  }

  function setLoading(on) {
    document.getElementById('loginBtn').disabled = on;
    document.getElementById('spinner').classList.toggle('visible', on);
  }

  // ── Login ─────────────────────────────────────────────
  async function handleLogin() {
    const email    = document.getElementById('email');
    const password = document.getElementById('password');
    let valid = true;

    const emailErr = !email.value.trim() || !email.value.includes('@');
    email.classList.toggle('error', emailErr);
    document.getElementById('err-email').classList.toggle('visible', emailErr);
    if (emailErr) valid = false;

    const passErr = !password.value.trim();
    password.classList.toggle('error', passErr);
    document.getElementById('err-password').classList.toggle('visible', passErr);
    if (passErr) valid = false;

    if (!valid) return;

    setLoading(true);
    try {
      const res  = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.value.trim(), password: password.value }),
      });
      const json = await res.json();

      if (!res.ok) {
        showToast(json.error || 'Login failed', 'error');
        return;
      }

      // Save token and user info
      localStorage.setItem('opsview_token', json.token);
      localStorage.setItem('opsview_user', JSON.stringify(json.user));

      showToast('Access granted — redirecting…');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

    } catch (err) {
      showToast('Network error — is the server running?', 'error');
    } finally {
      setLoading(false);
    }
  }

  document.getElementById('loginBtn').addEventListener('click', handleLogin);

  // Enter key support
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  // Clear errors on input
  ['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById(id).classList.remove('error');
    });
  });

  // Redirect if already logged in
  if (localStorage.getItem('opsview_token')) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
